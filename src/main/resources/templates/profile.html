<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <th:block th:insert="~{fragments/head::head('Judge v2: Profile')}"></th:block>

    <body>
        <div class="container">
            <div class="row rounded">
                <div class="col-12">
                    <th:block th:insert="~{fragments/nav}"></th:block>
                </div>
            </div>

            <div class="row tm-mt-big justify-content-center">
                <div class="col-xl-8 col-lg-10 col-md-12 col-sm-12">
                    <div class="bg-white tm-block">
                        <div class="row justify-content-center text-center">
                            <div class="col-12">
                                <h2 class="tm-block-title d-inline-block">User Profile</h2>
                            </div>
                        </div>
                        <div class="row mt-4 tm-edit-product-row">
                            <div class="col-xl-7 col-lg-7 col-md-12">
                                <form th:object="${userProfile}" action="" class="tm-edit-product-form">
                                    <div class="input-group mb-3">
                                        <label for="name" class="col-xl-4 col-lg-4 col-md-4 col-sm-5 col-form-label">
                                            Username
                                        </label>
                                        <input disabled id="name" name="name" type="text" th:field="*{username}"
                                               class="form-control validate col-xl-9 col-lg-8 col-md-8 col-sm-7">
                                    </div>
                                    <div class="input-group mb-3">
                                        <label for="homeworks" class="col-xl-4 col-lg-4 col-md-4 col-sm-5 mb-2">
                                            All sent homeworks
                                        </label>
                                        <textarea th:text="*{#strings.listJoin(homeworks, ', ')}" disabled
                                                  id="homeworks"
                                                  class="form-control validate col-xl-9 col-lg-8 col-md-8 col-sm-7"
                                                  rows="3"></textarea>
                                    </div>
                                    <div class="input-group mb-3">
                                        <label for="email" class="col-xl-4 col-lg-4 col-md-4 col-sm-5 col-form-label">
                                            Email
                                        </label>
                                        <input disabled id="email" name="email" type="text" th:field="*{email}"
                                               class="form-control validate col-xl-9 col-lg-8 col-md-8 col-sm-7"
                                               data-large-mode="true">
                                    </div>
                                    <div class="input-group mb-3">
                                        <label for="git" class="col-xl-4 col-lg-4 col-md-4 col-sm-5 col-form-label">
                                            Github Address
                                        </label>
                                        <input disabled id="git" name="git" type="text" th:field="*{git}"
                                               class="form-control validate col-xl-9 col-lg-8 col-md-7 col-sm-7">
                                    </div>
                                </form>
                            </div>
                            <div class="col-xl-4 col-lg-4 col-md-12 mx-auto mb-4">
                                <img src="/img/user-picture.jpg" alt="Profile Image" class="img-fluid mx-auto d-block">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <th:block th:insert="~{fragments/footer}"></th:block>
        </div>

    </body>

</html>
