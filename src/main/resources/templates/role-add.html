<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

    <th:block th:insert="~{fragments/head::head('Judge v2: Add Role')}"></th:block>

    <body>
        <div class="container">
            <div class="row rounded">
                <div class="col-12">
                    <th:block th:insert="~{fragments/nav}"></th:block>
                </div>
            </div>

            <div class="row tm-mt-big justify-content-center">
                <div class="col-xl-8 col-lg-10 col-md-12 col-sm-12">
                    <div class="bg-white tm-block">
                        <div class="row">
                            <div class="col-12">
                                <h2 class="tm-block-title d-inline-block">Add new role to user</h2>
                            </div>
                        </div>
                        <div class="row mt-4 tm-edit-product-row">
                            <div class="col-xl-7 col-lg-7 col-md-12">
                                <form th:action="@{/roles/add}" th:method="post" th:object="${roleAddBindingModel}"
                                      class="tm-edit-product-form">

                                    <div class="input-group mb-3">
                                        <label for="username"
                                               class="col-xl-4 col-lg-4 col-md-4 col-sm-5 col-form-label">User</label>
                                        <select class="custom-select col-xl-9 col-lg-8 col-md-8 col-sm-7" id="username"
                                                name="username">
                                            <option value=""
                                                    th:selected="${roleAddBindingModel == null or roleAddBindingModel.username == null}">
                                                Select user
                                            </option>

                                            <option th:each="name : ${usernames}"
                                                    th:text="${name}"
                                                    th:value="${name}"
                                                    th:selected="*{username} == ${name}">
                                                Username
                                            </option>
                                        </select>

                                        <div class="w-100"></div>
                                        <div class="mx-auto text-center align-content-center"
                                             th:if="${#fields.hasErrors('username')}">
                                            <small th:errors="*{username}" class="text-danger">
                                                Username error
                                            </small>
                                        </div>
                                    </div>

                                    <div class="input-group mb-3">
                                        <label class="col-xl-4 col-lg-4 col-md-4 col-sm-5 col-form-label">Role</label>
                                        <div>
                                            <th:block th:each="roleOpt : ${allRoles}">
                                                <input type="radio"
                                                       name="role"
                                                       th:id="${roleOpt}"
                                                       th:value="${roleOpt}"
                                                       th:checked="*{role} == ${roleOpt}">

                                                <label th:for="${roleOpt}"
                                                       th:text="${#strings.capitalizeWords(#strings.toLowerCase(roleOpt))}">
                                                    By default
                                                </label>
                                                <br/>
                                            </th:block>

                                            <div class="mx-auto text-center align-content-center"
                                                 th:if="${#fields.hasErrors('role')}">
                                                <small th:errors="*{role}" class="text-danger">
                                                    Error
                                                </small>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="input-group mb-3">
                                        <div class="ml-auto col-xl-8 col-lg-8 col-md-8 col-sm-7 pl-0">
                                            <button type="submit" class="btn btn-primary">Add</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                            <div class="col-xl-4 col-lg-4 col-md-12 mx-auto mb-4">
                                <img src="/img/admin.gif" alt="Exercise picture" width="100%">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <th:block th:insert="~{fragments/footer}"></th:block>
        </div>
    </body>
</html>
